# CI pipeline for OpenGate. Runs the same `make ci` gate a developer runs locally,
# so there is one source of truth for build/lint/test and no CI-vs-local drift.
name: CI

# Trigger on pushes to main (the protected branch) and on every pull request.
# We deliberately avoid `on: [push, pull_request]`: that double-fires when a push
# lands on a branch that already has an open PR (both events run the same SHA).
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit arrives on the same ref, so minutes
# are not spent on superseded SHAs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo. The default GITHUB_TOKEN would
# otherwise carry broad write scopes this job never needs.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # All actions are pinned to a FULL COMMIT SHA (not a mutable tag) for supply-chain
      # integrity; the trailing comment records the human-readable tag.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Single source of truth for the Go version: the `go` directive in go.mod
          # (currently 1.26). This is why no version is hardcoded here.
          go-version-file: go.mod
          # Caches the Go module + build caches, keyed on go.sum. No further config.
          cache: true

      # The full local gate: tools (installs the pinned golangci-lint v2.12.2 into ./bin),
      # fmt-check, vet, lint, test (emits coverage.out), build. `make ci` already lists
      # `tools` as its first prerequisite, so there is no separate tooling step here.
      # Postgres for the integration test is provided by testcontainers via the runner's
      # Docker daemon — NOT a services: block, which would sit unused since the test code
      # spins its own container.
      - name: Run CI pipeline
        run: make ci

      # AC3: surface the total coverage percentage in the run log.
      - name: Coverage summary
        run: go tool cover -func=coverage.out

      # Human-readable coverage report for download.
      - name: Coverage HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
          if-no-files-found: error
