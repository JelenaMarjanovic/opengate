# OpenGate v1 authorization model (Casbin).
#
# This is a FLAT access-control model with wildcard support, NOT RBAC with role
# inheritance. The subject is the session's role directly (owner/manager/auditor),
# there is deliberately no `g` role-grouping definition, and the matcher gives the
# owner's `*, *` seed rule its meaning by treating a policy value of "*" as
# matching any request value. A model without `g` is valid Casbin (the same shape
# as the upstream basic_model.conf); our roles are flat by design.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[policy_effect]
# Every seeded rule is an implicit allow (the `p` definition has no `eft`
# column), so a request is allowed when SOME matching policy allows it.
e = some(where (p.eft == allow))

[matchers]
m = r.sub == p.sub && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act)
